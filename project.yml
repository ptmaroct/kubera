name: Kubera
options:
  bundleIdPrefix: com.anujsharma
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  Kubera:
    type: application
    platform: macOS
    sources:
      - Kubera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anujsharma.Kubera
        PRODUCT_NAME: Kubera
        MARKETING_VERSION: "1.6.0-beta.1"
        CURRENT_PROJECT_VERSION: "9"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Kubera/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    entitlements:
      path: Kubera/Kubera.entitlements
      properties:
        com.apple.security.app-sandbox: false
